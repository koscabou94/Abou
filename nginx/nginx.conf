# ============================================================
# Configuration Nginx - Chatbot Éducatif du Ministère de l'Éducation du Sénégal
# Reverse proxy vers le backend FastAPI
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # === Format des logs ===
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # === Performance ===
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # === Compression Gzip ===
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # === Taille maximale du corps des requêtes (10MB pour les uploads de FAQ) ===
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # === Timeouts ===
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    # === Headers de sécurité ===
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # Serveur principal HTTP (port 80)
    # ============================================================
    server {
        listen 80;
        server_name _;

        # === Redirection HTTPS (décommenter en production avec SSL) ===
        # return 301 https://$server_name$request_uri;

        # === Serveur de développement / sans SSL ===
        root /usr/share/nginx/html;
        index index.html;

        # === Health check Nginx (pour load balancers) ===
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # === API Backend (proxy vers FastAPI) ===
        location /api/ {
            proxy_pass http://backend:8000/api/;
            proxy_http_version 1.1;

            # Headers de proxy
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts spécifiques à l'API (LLM peut prendre du temps)
            proxy_connect_timeout 10s;
            proxy_read_timeout 120s;
            proxy_send_timeout 60s;

            # Buffer pour améliorer les performances
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;

            # CORS headers (gérés par FastAPI, mais en sécurité ici aussi)
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, X-API-Key, X-Session-ID" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # === Health check Backend ===
        location /health {
            proxy_pass http://backend:8000/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # === Documentation API (développement uniquement) ===
        location /docs {
            proxy_pass http://backend:8000/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend:8000/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # === Fichiers statiques du frontend ===
        location / {
            try_files $uri $uri/ /index.html;

            # Cache des assets statiques
            location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
                expires 30d;
                add_header Cache-Control "public, no-transform";
            }
        }

        # === Bloquer l'accès aux fichiers sensibles ===
        location ~ /\.(env|git|htaccess) {
            deny all;
            return 404;
        }

        location ~ /(requirements\.txt|Dockerfile|docker-compose) {
            deny all;
            return 404;
        }
    }

    # ============================================================
    # Serveur HTTPS (port 443) - Décommenter pour la production
    # Nécessite Let's Encrypt (certbot) ou un certificat SSL valide
    # ============================================================
    # Pour configurer SSL avec Let's Encrypt :
    # 1. Installer certbot : apt install certbot python3-certbot-nginx
    # 2. Obtenir le certificat : certbot --nginx -d votre-domaine.sn
    # 3. Décommenter la section ci-dessous et ajuster le nom de domaine
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name votre-domaine.gouv.sn;
    #
    #     # Certificats SSL Let's Encrypt
    #     ssl_certificate /etc/letsencrypt/live/votre-domaine.gouv.sn/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/votre-domaine.gouv.sn/privkey.pem;
    #
    #     # Configuration SSL sécurisée
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     ssl_stapling on;
    #     ssl_stapling_verify on;
    #
    #     # HSTS (1 an)
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # ... (même configuration que le serveur HTTP ci-dessus)
    # }
}
