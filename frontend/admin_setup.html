<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduBot — Configuration Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #008751; --green-light: #e6f4ed;
      --blue: #1a3a5c; --red: #e31b23;
      --bg: #f1f5f9; --card: #fff;
      --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); min-height: 100vh;
           display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-box { width: 44px; height: 44px; border-radius: 12px; background: var(--green);
                display: flex; align-items: center; justify-content: center;
                font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 20px; color: #fff; }
    .logo-text { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 22px; color: var(--text); }
    .logo-text span { color: var(--green); }

    .card { background: var(--card); border-radius: var(--radius); padding: 36px 40px;
            width: 100%; max-width: 480px; box-shadow: 0 4px 24px rgba(0,0,0,.1); }
    .card h1 { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .card p { color: var(--muted); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }

    .info-box {
      background: #fefce8; border: 1px solid #fde68a; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 24px; font-size: 13px; color: #92400e; line-height: 1.6;
    }
    .info-box strong { display: block; margin-bottom: 4px; font-size: 14px; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--muted);
            text-transform: uppercase; letter-spacing: .4px; margin-bottom: 7px; }
    input {
      width: 100%; border: 2px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 15px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color .15s; background: var(--bg);
    }
    input:focus { border-color: var(--green); background: #fff; }

    .btn {
      width: 100%; background: var(--green); color: #fff; border: none;
      padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity .15s; margin-top: 8px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { opacity: .87; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3);
               border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result { display: none; border-radius: 12px; padding: 18px 20px;
              margin-top: 20px; font-size: 14px; line-height: 1.6; }
    .result.success { background: var(--green-light); border: 1px solid #bbf7d0; color: #166534; }
    .result.error { background: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
    .result strong { display: block; font-size: 16px; margin-bottom: 6px; }

    .step2 { display: none; }
    .step2.show { display: block; }
    .next-steps { background: var(--bg); border-radius: 10px; padding: 16px; margin-top: 16px; font-size: 14px; }
    .next-steps ol { padding-left: 18px; margin-top: 6px; line-height: 2; }
    .next-steps code { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 13px; }

    a.home-link { margin-top: 20px; font-size: 14px; color: var(--muted); text-decoration: none; }
    a.home-link:hover { color: var(--green); }
  </style>
</head>
<body>

<div class="logo">
  <div class="logo-box">E</div>
  <div class="logo-text">Edu<span>Bot</span></div>
</div>

<div class="card">
  <h1>Configuration Admin</h1>
  <p>Crée le compte administrateur de la plateforme EduBot.<br>
     Cette page est sécurisée par ta clé API Render.</p>

  <div class="info-box">
    <strong>Où trouver ta clé API ?</strong>
    Render → Dashboard → EduBot → <em>Environment</em> → variable <code>API_KEY</code>
  </div>

  <div class="field">
    <label>Clé API (X-API-Key)</label>
    <input type="password" id="api-key" placeholder="Colle ta clé API Render ici…" />
  </div>
  <div class="field">
    <label>Email de l'administrateur</label>
    <input type="email" id="admin-email" value="admin@edubot.sn" />
  </div>
  <div class="field">
    <label>Mot de passe admin</label>
    <input type="password" id="admin-password" placeholder="Minimum 6 caractères" value="Admin2026!" />
  </div>
  <div class="field">
    <label>Nom complet</label>
    <input type="text" id="admin-name" value="Administrateur EduBot" />
  </div>

  <button class="btn" id="btn-create" onclick="createAdmin()">
    Créer le compte admin
  </button>

  <div class="result" id="result-box"></div>

  <div class="step2" id="step2">
    <button class="btn" id="btn-login" onclick="loginAdmin()"
      style="background:#1a3a5c;margin-top:12px">
      → Se connecter maintenant comme admin
    </button>
    <div class="result" id="login-result-box" style="margin-top:12px"></div>
  </div>
</div>

<a class="home-link" href="/">← Retour à EduBot</a>

<script>
const API = window.API_URL || '/api';

async function createAdmin() {
  const apiKey   = document.getElementById('api-key').value.trim();
  const email    = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value.trim();
  const fullName = document.getElementById('admin-name').value.trim();
  const btn      = document.getElementById('btn-create');
  const box      = document.getElementById('result-box');
  const step2    = document.getElementById('step2');

  if (!apiKey)    { showError('Entre ta clé API Render.'); return; }
  if (!email)     { showError('Entre un email valide.'); return; }
  if (password.length < 6) { showError('Mot de passe trop court (6 car. minimum).'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Création en cours…';
  box.style.display = 'none';
  step2.classList.remove('show');

  try {
    const res = await fetch(API + '/auth/setup-admin', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-API-Key': apiKey,
      },
      body: JSON.stringify({ email, password, full_name: fullName }),
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.detail || `Erreur ${res.status}`);
    } else {
      box.className = 'result success';
      box.innerHTML = `<strong>✅ Compte admin ${data.action} !</strong>
        Email : <strong>${data.email}</strong><br>
        Tu peux maintenant te connecter avec cet email et ton mot de passe.`;
      box.style.display = 'block';
      step2.classList.add('show');
    }
  } catch (e) {
    showError('Erreur réseau : ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Créer le compte admin';
  }
}

function showError(msg) {
  const box = document.getElementById('result-box');
  box.className = 'result error';
  box.innerHTML = `<strong>Erreur</strong>${msg}`;
  box.style.display = 'block';
}

async function loginAdmin() {
  const email    = document.getElementById('admin-email').value.trim();
  const password = document.getElementById('admin-password').value.trim();
  const btn      = document.getElementById('btn-login');
  const box      = document.getElementById('login-result-box');

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Connexion…';
  box.style.display = 'none';

  try {
    const res = await fetch(API + '/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ method: 'email', identifier: email, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || `Erreur ${res.status}`);

    localStorage.setItem('edubot_token', data.access_token);
    localStorage.setItem('edubot_user', JSON.stringify(data.user));

    box.className = 'result success';
    box.innerHTML = `<strong>✅ Connecté en tant qu'admin !</strong>
      Redirection vers l'interface de création de leçons…`;
    box.style.display = 'block';

    setTimeout(() => { window.location.href = '/admin_lessons.html'; }, 1500);
  } catch (e) {
    box.className = 'result error';
    box.innerHTML = `<strong>Erreur de connexion</strong>${e.message}`;
    box.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '→ Se connecter maintenant comme admin';
  }
}
</script>
</body>
</html>
